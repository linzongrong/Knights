worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # ----------------------------------------------------------------------
    # Gzip Compression Configuration
    # ----------------------------------------------------------------------
    gzip on;
    gzip_min_length 1k;                # Only compress files larger than 1k
    gzip_comp_level 6;                 # Compression level (1-9), 6 is a good balance
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml;
    gzip_vary on;                      # Add 'Vary: Accept-Encoding' header
    gzip_disable "MSIE [1-6]\.";       # Disable for old IE

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        server_name  localhost; # Replace with your domain

        root   /usr/share/nginx/html; # Path to your 'dist' folder
        index  index.html index.htm;

        # ------------------------------------------------------------------
        # Frontend Static Files
        # ------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html; # History mode support
        }

        # ------------------------------------------------------------------
        # AMap (Gaode) Security Proxy
        # ------------------------------------------------------------------
        # Proxies requests to AMap service and appends the security code.
        # Frontend should set: window._AMapSecurityConfig = { serviceHost: '/_AMapService' }
        location /_AMapService/ {
            set $del "";
            if ($is_args) {
                set $del "&";
            }
            set $args "$args${del}jscode=aa0cfa0b43e877a92bbf11e25c84e913";
            proxy_pass https://restapi.amap.com/;
            
            # Proxy headers
            proxy_set_header Host restapi.amap.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # SNI Support for HTTPS upstream
            proxy_ssl_server_name on;
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_ssl_session_reuse off;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
